<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Школьный Баттл</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; }
        body { background: linear-gradient(135deg,#2c5f8a,#4a7fb5); min-height:100vh; display:flex; justify-content:center; align-items:center; font-family:sans-serif; padding:10px; }
        .game { background:rgba(255,255,255,0.1); backdrop-filter:blur(20px); border-radius:30px; padding:20px; max-width:420px; width:100%; }
        .top { display:flex; justify-content:space-between; padding:10px 15px; background:rgba(0,0,0,0.2); border-radius:15px; margin-bottom:20px; color:#fff; font-weight:bold; }
        .char { width:180px; height:180px; background:radial-gradient(#ffd700,#f0a500); border-radius:50%; margin:20px auto; display:flex; align-items:center; justify-content:center; font-size:80px; transition:0.1s; cursor:pointer; }
        .char:active { transform:scale(0.92); }
        .stats { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; color:#fff; text-align:center; margin:15px 0; }
        .stat { background:rgba(0,0,0,0.2); padding:10px; border-radius:10px; }
        .stat .v { font-size:22px; font-weight:bold; color:#ffd700; }
        .btn { width:100%; padding:14px; border:none; border-radius:15px; font-size:18px; font-weight:bold; color:#fff; margin:6px 0; transition:0.2s; }
        .btn:active { transform:scale(0.95); }
        .bonus { background:linear-gradient(135deg,#ffd93d,#f6b93b); color:#2c3e50; }
        .battle { background:linear-gradient(135deg,#ff6b6b,#ee5a24); }
        .menu { display:grid; grid-template-columns:repeat(5,1fr); gap:5px; margin-top:15px; }
        .menu button { background:rgba(255,255,255,0.1); border:none; padding:10px 5px; border-radius:12px; color:#fff; font-size:10px; display:flex; flex-direction:column; align-items:center; gap:3px; }
        .menu button:active { background:rgba(255,255,255,0.25); transform:scale(0.95); }
        .tap-effect { position:fixed; pointer-events:none; font-size:40px; font-weight:bold; color:#ffd700; animation:float 0.8s forwards; z-index:1000; }
        @keyframes float { 0%{opacity:1;transform:translateY(0) scale(0.5)} 100%{opacity:0;transform:translateY(-150px) scale(1.5)} }
    </style>
</head>
<body>
<div class="game">
    <div class="top">
        <span>📚 <span id="kp">0</span></span>
        <span>🧠 <span id="st">0</span></span>
        <span>🏆 <span id="lvl">1</span></span>
    </div>
    <div class="char" id="char">🧑‍🎓</div>
    <div class="stats">
        <div class="stat"><div class="v" id="taps">0</div><div>👆</div></div>
        <div class="stat"><div class="v" id="streak">0</div><div>🔥</div></div>
        <div class="stat"><div class="v" id="bonus">0</div><div>🎁</div></div>
    </div>
    <button class="btn bonus" id="bonusBtn">🎁 Бонус</button>
    <button class="btn battle" id="battleBtn">⚔️ Битва</button>
    <div class="menu">
        <button>🏪<span>Магазин</span></button>
        <button>🎒<span>Инвентарь</span></button>
        <button>🏫<span>Лобби</span></button>
        <button>📊<span>Навыки</span></button>
        <button>⭐<span>Слава</span></button>
    </div>
</div>
<script>
    const tg = window.Telegram?.WebApp;
    if (tg) { tg.ready(); tg.expand(); }

    const userId = tg?.initDataUnsafe?.user?.id || 12345;
    let kp=0, st=0, lvl=1, taps=0, streak=0;

    const audio = new (window.AudioContext || window.webkitAudioContext)();
    function play() {
        try {
            const o=audio.createOscillator(), g=audio.createGain();
            o.connect(g); g.connect(audio.destination);
            o.frequency.value=600+Math.random()*200;
            o.type='sine';
            g.gain.setValueAtTime(0.1, audio.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audio.currentTime+0.1);
            o.start(); o.stop(audio.currentTime+0.1);
        } catch(e){}
    }

    function updateUI() {
        document.getElementById('kp').textContent=kp;
        document.getElementById('st').textContent=st;
        document.getElementById('lvl').textContent=lvl;
        document.getElementById('taps').textContent=taps;
        document.getElementById('streak').textContent=streak;
    }

    document.getElementById('char').addEventListener('click', (e)=>{
        play();
        const rect = e.target.getBoundingClientRect();
        const x=e.clientX||rect.left+rect.width/2, y=e.clientY||rect.top+rect.height/2;
        const el=document.createElement('div');
        el.className='tap-effect';
        el.textContent='+1';
        el.style.left=x-20+'px'; el.style.top=y-20+'px';
        document.body.appendChild(el);
        setTimeout(()=>el.remove(),800);
        kp++; taps++;
        if(taps%10===0) st++;
        if(Math.floor(kp/50)+1>lvl) lvl=Math.floor(kp/50)+1;
        updateUI();
        // имитация отправки на сервер (опционально)
        fetch('/api/tap', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({user_id: userId})
        }).catch(()=>{});
    });

    document.getElementById('bonusBtn').addEventListener('click', ()=>{
        kp += 10 + streak;
        updateUI();
    });

    document.getElementById('battleBtn').addEventListener('click', ()=>{
        const user = Math.floor(Math.random()*50)+50;
        const bot = Math.floor(Math.random()*40)+40;
        if(user>bot) { kp += Math.floor(Math.random()*20)+10; alert('Победа! +KP'); }
        else { kp += 5; alert('Поражение... +5 KP'); }
        updateUI();
    });

    updateUI();
</script>
</body>
</html>
